name: Deploy Carousel Renderer

on:
  push:
    branches: [master]
    paths:
      - 'apps/carousel-renderer/**'
      - '.github/workflows/deploy-carousel-renderer.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: apps/carousel-renderer
        # Use --ignore-scripts to skip root workspace postinstall (prisma generate)
        # @resvg/resvg-js bundles pre-built linux-x64 binaries — no postinstall needed
        run: npm ci --ignore-scripts

      - name: Build
        working-directory: apps/carousel-renderer
        run: npm run build

      - name: Create deployment zip
        working-directory: apps/carousel-renderer
        run: |
          # Include built output + node_modules (needed for native WASM binaries)
          zip -r ../../carousel-deploy.zip dist/ node_modules/ host.json package.json

      - name: Deploy via Kudu zipdeploy
        env:
          SCM_USER: ${{ secrets.AZURE_CAROUSEL_SCM_USER }}
          SCM_PASS: ${{ secrets.AZURE_CAROUSEL_SCM_PASS }}
        run: |
          # Write to .netrc to avoid $ in username being interpreted by bash
          printf 'machine flowintelli-carousel.scm.azurewebsites.net login %s password %s\n' "$SCM_USER" "$SCM_PASS" > ~/.netrc
          chmod 600 ~/.netrc
          curl -X POST \
            "https://flowintelli-carousel.scm.azurewebsites.net/api/zipdeploy?isAsync=false" \
            --netrc \
            -H "Content-Type: application/octet-stream" \
            --data-binary @carousel-deploy.zip \
            -f \
            -w "\nHTTP %{http_code}\n"
          rm -f ~/.netrc

      - name: Verify function is live
        run: |
          sleep 15
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "x-api-key: ${{ secrets.CAROUSEL_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"article_title":"CI test","article_body":"smoke test body text for deployment verification"}' \
            "https://flowintelli-carousel.azurewebsites.net/api/generatecarousel")
          echo "Function responded: HTTP $HTTP"
          # 200 = success, 502 = GPT key missing in env (still means function loaded)
          if [ "$HTTP" != "200" ] && [ "$HTTP" != "502" ]; then
            echo "ERROR: unexpected status $HTTP — deploy may have failed"
            exit 1
          fi
          echo "Deploy verified ✓"
