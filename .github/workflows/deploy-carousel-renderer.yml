name: Deploy Carousel Renderer

on:
  push:
    branches: [master]
    paths:
      - 'apps/carousel-renderer/**'
      - '.github/workflows/deploy-carousel-renderer.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install, build & package carousel-renderer
        run: |
          # Copy to /tmp to escape monorepo workspace hoisting entirely.
          # npm install inside a workspace dir always hoists to repo root node_modules,
          # even with --no-workspaces. Running outside the repo avoids this.
          mkdir -p /tmp/carousel-build
          cp -r apps/carousel-renderer/. /tmp/carousel-build/
          cd /tmp/carousel-build

          # Install all deps (devDeps needed for tsc), ignore scripts to skip prisma
          npm install --ignore-scripts

          # Compile TypeScript
          ./node_modules/.bin/tsc

          # Remove devDeps before zipping
          npm prune --production --ignore-scripts

          # Sanity check — @resvg/resvg-js should be several MB
          echo "=== node_modules size: $(du -sh node_modules/ | cut -f1) ==="
          ls node_modules/@resvg/ 2>/dev/null || echo "WARNING: @resvg MISSING"

          # Download Poppins fonts (excluded from git, must be bundled for Azure)
          BASE="https://raw.githubusercontent.com/google/fonts/47831f08ec6d6d7ad6b465f23dc9f9a890a2a04b/ofl/poppins"
          mkdir -p fonts
          curl -sL "$BASE/Poppins-ExtraBold.ttf" -o fonts/Poppins-ExtraBold.ttf
          curl -sL "$BASE/Poppins-SemiBold.ttf"  -o fonts/Poppins-SemiBold.ttf
          curl -sL "$BASE/Poppins-Medium.ttf"    -o fonts/Poppins-Medium.ttf
          curl -sL "$BASE/Poppins-Regular.ttf"   -o fonts/Poppins-Regular.ttf
          echo "=== Font sizes: $(du -sh fonts/*.ttf) ==="

          # node_modules must be included — @resvg/resvg-js has native linux-x64 WASM binaries
          # fonts/ must be included — excluded from git, loaded at runtime via readFileSync
          zip -r /tmp/carousel-deploy.zip dist/ node_modules/ fonts/ host.json package.json
          echo "=== Zip size: $(du -sh /tmp/carousel-deploy.zip | cut -f1) ==="

      - name: Deploy via Kudu zipdeploy
        env:
          SCM_USER: ${{ secrets.AZURE_CAROUSEL_SCM_USER }}
          SCM_PASS: ${{ secrets.AZURE_CAROUSEL_SCM_PASS }}
        run: |
          # Write to .netrc to avoid $ in username being interpreted by bash
          printf 'machine flowintelli-carousel.scm.azurewebsites.net login %s password %s\n' "$SCM_USER" "$SCM_PASS" > ~/.netrc
          chmod 600 ~/.netrc
          curl -X POST \
            "https://flowintelli-carousel.scm.azurewebsites.net/api/zipdeploy?isAsync=false" \
            --netrc \
            -H "Content-Type: application/octet-stream" \
            --data-binary @/tmp/carousel-deploy.zip \
            -f \
            -w "\nHTTP %{http_code}\n"
          rm -f ~/.netrc

      - name: Verify function is live
        run: |
          sleep 15
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "x-api-key: ${{ secrets.CAROUSEL_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"article_title":"CI test","article_body":"smoke test body text for deployment verification"}' \
            "https://flowintelli-carousel.azurewebsites.net/api/generatecarousel")
          echo "Function responded: HTTP $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "ERROR: expected HTTP 200, got $HTTP — function may be broken"
            exit 1
          fi
          echo "Deploy verified ✓"
